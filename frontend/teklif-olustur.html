<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Teklif Oluştur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <script src="assets/js/auth.js"></script>
  <script>
    checkAuth();
  </script>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="teklif-liste.html">Teklif Yönetimi</a>
      <button class="btn btn-outline-danger" onclick="logout()">Çıkış Yap</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>Yeni Teklif Oluştur</h2>
    <form id="teklifForm">
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Başlık</label>
          <input type="text" id="baslik" class="form-control" required />
        </div>
        <div class="col-md-6">
          <label class="form-label">Müşteri Adı</label>
          <input type="text" id="musteriAdi" class="form-control" required />
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Sistem Tipi</label>
          <input type="text" id="sistemTipi" class="form-control" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Sistem Adedi</label>
          <input type="number" id="sistemAdedi" class="form-control" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Toplam Tutar</label>
          <input type="number" id="toplamTutar" class="form-control" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Teklif Tipi</label>
        <select id="teklifTipi" class="form-select">
          <option value="giyotin">Giyotin</option>
          <option value="surme">Sürme</option>
          <option value="karma">Karma</option>
        </select>
      </div>
      <button type="submit" class="btn btn-success">Kaydet</button>
      <a href="teklif-liste.html" class="btn btn-secondary">Vazgeç</a>
    </form>
  </div>

  <script>
    document.getElementById("teklifForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const token = localStorage.getItem("token");
      const payload = {
        baslik: document.getElementById("baslik").value,
        musteriAdi: document.getElementById("musteriAdi").value,
        sistemTipi: document.getElementById("sistemTipi").value,
        sistemAdedi: parseInt(document.getElementById("sistemAdedi").value),
        toplamTutar: parseFloat(document.getElementById("toplamTutar").value),
        teklifTipi: document.getElementById("teklifTipi").value
      };

      const response = await fetch("http://localhost:5000/api/teklif", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        alert("Teklif başarıyla oluşturuldu.");
        window.location.href = "teklif-liste.html";
      } else {
        alert("Bir hata oluştu.");
      }
    });
  </script>
</body>
</html>
