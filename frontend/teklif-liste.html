<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Teklif Listesi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body>
  <script src="assets/js/auth.js"></script>
  <script>
    // Token kontrolü
    checkAuth();
  </script>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="#">Teklif Yönetimi</a>
      <button class="btn btn-outline-danger" onclick="logout()">Çıkış Yap</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Teklif Listesi</h2>
      <a href="teklif-olustur.html" class="btn btn-primary">Yeni Teklif Oluştur</a>
    </div>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Başlık</th>
          <th>Müşteri</th>
          <th>Tarih</th>
          <th>Tutar</th>
          <th>İşlemler</th>
        </tr>
      </thead>
      <tbody id="teklifTableBody">
        <tr>
          <td colspan="6" class="text-center">Yükleniyor...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      const response = await fetch("http://localhost:5000/api/teklif", {
        headers: { Authorization: "Bearer " + token }
      });

      const tbody = document.getElementById("teklifTableBody");
      tbody.innerHTML = "";

      if (!response.ok) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center">Teklifler yüklenemedi.</td></tr>`;
        return;
      }

      const teklifler = await response.json();

      if (teklifler.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center">Henüz teklif bulunmamaktadır.</td></tr>`;
        return;
      }

      teklifler.forEach((teklif, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${teklif.baslik || "-"}</td>
          <td>${teklif.musteriAdi || "-"}</td>
          <td>${new Date(teklif.tarih).toLocaleDateString()}</td>
          <td>${teklif.vergilerDahilToplam?.toLocaleString('tr-TR')} ₺</td>
          <td>
            <a href="teklif-detay.html?id=${teklif._id}" class="btn btn-sm btn-info">Detay</a>
            <button class="btn btn-sm btn-danger" onclick="sil('${teklif._id}')">Sil</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });

    async function sil(id) {
      if (!confirm("Teklifi silmek istediğinize emin misiniz?")) return;

      const token = localStorage.getItem("token");
      const response = await fetch(`http://localhost:5000/api/teklif/${id}`, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + token }
      });

      if (response.ok) {
        alert("Teklif silindi.");
        window.location.reload();
      } else {
        alert("Silme işlemi başarısız.");
      }
    }
  </script>
</body>
</html>
